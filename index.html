<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Nexus — Project Showcase Hub</title>
    <meta name="description" content="A growing collection of polished portfolio showcases." />
    <meta name="theme-color" content="#0d9488" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nexus — Project Showcase Hub" />
    <meta
      property="og:description"
      content="A growing collection of polished portfolio showcases."
    />
    <meta property="og:image" content="./og-image-nexus.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nexus — Project Showcase Hub" />
    <meta
      name="twitter:description"
      content="A growing collection of polished portfolio showcases."
    />
    <meta name="twitter:image" content="./og-image-nexus.jpg" />

    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #030712;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        min-height: 100vh;
        font-feature-settings: 'cv03', 'cv04', 'cv11';
      }
      svg {
        width: 100%;
        max-width: 900px;
        height: auto;
        padding: 24px;
        box-sizing: border-box;
      }
      .version-tag {
        margin: 0;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        font-size: 13px;
        color: #2dd4bf;
      }
      .template-link {
        font-family:
          Inter,
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        font-size: 14px;
        color: #9ca3af;
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition:
          color 0.15s,
          border-color 0.15s;
      }
      .template-link:hover {
        color: #2dd4bf;
        border-bottom-color: #2dd4bf;
      }
    </style>
  </head>
  <body>
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 1200 630"
      overflow="visible"
      role="img"
      aria-label="Nexus — Project Showcase Hub"
    >
      <defs>
        <linearGradient id="ogTile" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#2dd4bf" />
          <stop offset="0.55" stop-color="#14b8a6" />
          <stop offset="1" stop-color="#0d9488" />
        </linearGradient>
        <linearGradient id="ogSheen" x1="16" y1="1" x2="16" y2="20" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#ffffff" stop-opacity="0.22" />
          <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
        </linearGradient>
        <radialGradient id="ogGlow" cx="240" cy="315" r="420" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#0d9488" stop-opacity="0.25" />
          <stop offset="1" stop-color="#0d9488" stop-opacity="0" />
        </radialGradient>
      </defs>

      <rect width="1200" height="630" fill="#030712" />
      <rect x="-300" y="-300" width="1800" height="1230" fill="url(#ogGlow)" />

      <g transform="translate(110 185) scale(8.125)">
        <rect width="32" height="32" rx="8" fill="url(#ogTile)" />
        <rect width="32" height="32" rx="8" fill="url(#ogSheen)" />
        <g fill="#ffffff">
          <ellipse cx="16" cy="16" rx="4.8" ry="2.3" transform="rotate(0 16 16) translate(9.7 0)" />
          <ellipse
            cx="16"
            cy="16"
            rx="4.8"
            ry="2.3"
            transform="rotate(60 16 16) translate(9.7 0)"
          />
          <ellipse
            cx="16"
            cy="16"
            rx="4.8"
            ry="2.3"
            transform="rotate(120 16 16) translate(9.7 0)"
          />
          <ellipse
            cx="16"
            cy="16"
            rx="4.8"
            ry="2.3"
            transform="rotate(180 16 16) translate(9.7 0)"
          />
          <ellipse
            cx="16"
            cy="16"
            rx="4.8"
            ry="2.3"
            transform="rotate(240 16 16) translate(9.7 0)"
          />
          <ellipse
            cx="16"
            cy="16"
            rx="4.8"
            ry="2.3"
            transform="rotate(300 16 16) translate(9.7 0)"
          />
          <circle cx="16" cy="16" r="4.5" />
        </g>
      </g>

      <text
        x="460"
        y="277"
        font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="104"
        font-weight="800"
        fill="#ffffff"
      >
        Nexus
      </text>

      <text
        x="462"
        y="340"
        font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="34"
        font-weight="600"
        fill="#2dd4bf"
      >
        Project Showcase Hub
      </text>

      <text
        x="462"
        y="392"
        font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="24"
        font-weight="400"
        fill="#9ca3af"
      >
        A growing collection of polished
      </text>
      <text
        x="462"
        y="424"
        font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="24"
        font-weight="400"
        fill="#9ca3af"
      >
        portfolio showcases.
      </text>
    </svg>

    <!-- Hardcoded — this page is build-free, no __APP_VERSION__ injection here.
         Bump by hand whenever nexus-alpha's package.json version changes (see
         DEVELOPMENT.md → "Versioning the template" in nexus-alpha). Shortened to
         "v..." (no "Nexus" prefix) since it now sits right under the wordmark. -->
    <p class="version-tag">v0.1.0</p>
    <a class="template-link" href="./template/">View the template →</a>
  </body>
</html>
